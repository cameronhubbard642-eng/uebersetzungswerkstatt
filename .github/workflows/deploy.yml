name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'
      - 'manifest-1.json'
      - 'manifest-2.json'
      - 'manifest-3.json'
      - 'manifest-4.json'
      - 'manifest-5.json'
      - 'icon-*.png'
      - 'apple-touch-icon-*.png'
      - '_headers'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# WP-DEP-G-8: migrated from GitHub Pages to Cloudflare Pages via Wrangler.
# CF Pages serves the staged tree and honors the root-level `_headers` file
# (Report-Only CSP + report-uri delivered as real HTTP headers).

permissions:
  contents: read

# Only one deploy in flight at a time; queued deploys from rapid pushes
# get canceled rather than stacked.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  stage-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Stage publish tree (whitelist)
        run: |
          set -euo pipefail
          STAGE="${{ runner.temp }}/stage"
          mkdir -p "$STAGE"
          # Root-level source files.
          cp index.html "$STAGE/"
          cp sw.js "$STAGE/"
          cp manifest.json "$STAGE/"
          cp manifest-1.json manifest-2.json manifest-3.json \
             manifest-4.json manifest-5.json "$STAGE/"
          # Icon PNGs — all at repo root (no icons/ subdirectory).
          cp icon-*.png apple-touch-icon-*.png "$STAGE/"
          # WP-DEP-G-8: HTTP header config for Cloudflare Pages.
          cp _headers "$STAGE/"

          # Sanity: dev-only paths must NOT be present.
          for bad in REVIEW plans status reviews docs .claude .github scripts; do
            if [ -e "$STAGE/$bad" ]; then
              echo "::error::staging tree contains excluded path: $bad" >&2
              exit 1
            fi
          done

          # Record the staged tree for the Action log.
          echo "Staged tree:"
          ( cd "$STAGE" && find . -type f | sort )

      - name: Stamp CACHE_NAME with short SHA
        run: |
          set -euo pipefail
          STAGE="${{ runner.temp }}/stage"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Replace any werkstatt-* value in staged sw.js with the short commit SHA.
          # Prefix-anchored pattern is future-proof across any static CACHE_NAME value.
          sed -i "s/^const CACHE_NAME = '[^']*';/const CACHE_NAME = 'werkstatt-${SHORT_SHA}';/" "$STAGE/sw.js"
          # Assert the stamp landed — fail loud if the original placeholder survived.
          if grep -q "^const CACHE_NAME = '[^']*'" "$STAGE/sw.js" && ! grep -q "^const CACHE_NAME = 'werkstatt-${SHORT_SHA}'" "$STAGE/sw.js"; then
            echo "::error::CACHE_NAME stamp did not land; expected 'werkstatt-${SHORT_SHA}' in staged sw.js" >&2
            exit 1
          fi
          grep -n "^const CACHE_NAME" "$STAGE/sw.js"

      - name: Stamp deploy-sha in index.html (WP-DEP-G-8)
        run: |
          set -euo pipefail
          STAGE="${{ runner.temp }}/stage"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Belt: assert the charset anchor exists before attempting the insert.
          if ! grep -q '<meta charset="UTF-8">' "$STAGE/index.html"; then
            echo "::error::deploy-sha anchor (<meta charset=\"UTF-8\">) not found in staged index.html" >&2
            exit 1
          fi
          # Insert deploy-sha meta immediately after the charset declaration.
          # Tag is not present in the main-branch source; inserted here only.
          sed -i 's|<meta charset="UTF-8">|<meta charset="UTF-8">\n<meta name="deploy-sha" content="'"$SHORT_SHA"'">|' "$STAGE/index.html"
          # Assert the stamp landed.
          if ! grep -q 'name="deploy-sha" content="'"$SHORT_SHA"'"' "$STAGE/index.html"; then
            echo "::error::deploy-sha stamp did not land in staged index.html" >&2
            exit 1
          fi
          grep -o 'name="deploy-sha" content="[^"]*"' "$STAGE/index.html"

      - name: Static smoke check on staged tree
        run: |
          set -euo pipefail
          STAGE="${{ runner.temp }}/stage"
          FAIL=0
          # CACHE_NAME was stamped to werkstatt-<sha>.
          CACHE=$(grep "^const CACHE_NAME" "$STAGE/sw.js" | sed "s/.*'\([^']*\)'.*/\1/")
          echo "$CACHE" | grep -qE "^werkstatt-[0-9a-f]+" \
            || { echo "::error::CACHE_NAME='$CACHE' not in expected werkstatt-<sha> format"; FAIL=1; }
          # _headers: CSP delivered via CF Pages header (not meta tag).
          grep -q "Content-Security-Policy" "$STAGE/_headers" \
            || { echo "::error::No CSP directive in _headers"; FAIL=1; }
          # index.html checks.
          grep -q 'interactive-widget=resizes-content' "$STAGE/index.html" \
            || { echo "::error::interactive-widget=resizes-content missing from viewport"; FAIL=1; }
          grep -q '_escapeHtml' "$STAGE/index.html" \
            || { echo "::error::_escapeHtml not found — XSS guard may have been deleted"; FAIL=1; }
          # _headers present.
          [ -f "$STAGE/_headers" ] \
            || { echo "::error::_headers missing from staged tree"; FAIL=1; }
          [ "$FAIL" -eq 0 ] || exit 1
          echo "CACHE_NAME: $CACHE"
          echo "Static smoke checks passed"

      - name: Publish to Cloudflare Pages
        id: cf_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ${{ runner.temp }}/stage --project-name=uebersetzungswerkstatt --branch=main --commit-dirty=true

  verify:
    needs: stage-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_URL: https://uebersetzungswerkstatt.glossolalia.dev
      POLL_INTERVAL_S: 30
      MAX_ATTEMPTS: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set expected CACHE_NAME
        id: expected
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "cache_name=werkstatt-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Expected CACHE_NAME: werkstatt-${SHORT_SHA}"

      - name: Poll sw.js — wait for CACHE_NAME parity (max 10 min)
        id: poll
        run: |
          expected="${{ steps.expected.outputs.cache_name }}"
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            raw=$(curl -sSL --max-time 15 \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "${DEPLOY_URL}/sw.js" 2>/dev/null || true)
            served=$(echo "$raw" | grep "^const CACHE_NAME" | sed "s/.*'\([^']*\)'.*/\1/")
            echo "[$i/$MAX_ATTEMPTS] served='$served'  expected='$expected'"
            if [ "$served" = "$expected" ]; then
              echo "matched=true"   >> "$GITHUB_OUTPUT"
              echo "served=$served" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::sw.js CACHE_NAME='$served' after $(( MAX_ATTEMPTS * POLL_INTERVAL_S ))s — expected '$expected'. Deploy may have stalled."
              exit 1
            fi
            sleep "$POLL_INTERVAL_S"
          done

      - name: Verify index.html → HTTP 200
        run: |
          code=$(curl -o /dev/null -sSL --max-time 15 \
            -H "Cache-Control: no-cache" \
            -w "%{http_code}" "${DEPLOY_URL}/index.html")
          echo "index.html → HTTP $code"
          [ "$code" = "200" ] || { echo "::error::index.html returned HTTP $code"; exit 1; }

      - name: Verify manifest-1.json → HTTP 200
        run: |
          code=$(curl -o /dev/null -sSL --max-time 15 \
            -H "Cache-Control: no-cache" \
            -w "%{http_code}" "${DEPLOY_URL}/manifest-1.json")
          echo "manifest-1.json → HTTP $code"
          [ "$code" = "200" ] || { echo "::error::manifest-1.json returned HTTP $code"; exit 1; }

      - name: Verify icon-512.png → HTTP 200
        run: |
          code=$(curl -o /dev/null -sSL --max-time 15 \
            -H "Cache-Control: no-cache" \
            -w "%{http_code}" "${DEPLOY_URL}/icon-512.png")
          echo "icon-512.png → HTTP $code"
          [ "$code" = "200" ] || { echo "::error::icon-512.png returned HTTP $code"; exit 1; }

      - name: Verify Content-Security-Policy-Report-Only header present
        run: |
          headers=$(curl -sI --max-time 15 "${DEPLOY_URL}/")
          echo "$headers" | grep -i "content-security-policy-report-only" \
            || { echo "::error::Content-Security-Policy-Report-Only header not found on ${DEPLOY_URL}/"; exit 1; }
          echo "CSP-Report-Only header present"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Post-deploy verification — WP-DEP-G-8"
            echo ""
            echo "**Deploy URL:** \`${DEPLOY_URL}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            if [ "${{ steps.poll.outputs.matched }}" = "true" ]; then
              echo ""
              echo "| Check | Result |"
              echo "|---|---|"
              echo "| CACHE_NAME | ✅ \`${{ steps.poll.outputs.served }}\` — matches commit |"
              echo "| index.html | ✅ HTTP 200 |"
              echo "| manifest-1.json | ✅ HTTP 200 |"
              echo "| icon-512.png | ✅ HTTP 200 |"
              echo "| CSP-Report-Only header | ✅ |"
            else
              echo ""
              echo "❌ Probe failed — see step logs above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
