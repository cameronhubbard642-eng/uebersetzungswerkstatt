# WP-DEP-G-8 — Post-deploy CF Pages parity probe
#
# Runs after every push to main.  Polls the live CF Pages site until the
# served sw.js CACHE_NAME matches the werkstatt-<sha> value stamped by
# the deploy workflow for this push, then validates key static assets
# and the CSP-Report-Only header.
#
# Timing: polls every 30 s for up to 10 minutes (20 attempts).
# On persistent mismatch the job fails — surfacing a deploy stall or
# CDN propagation failure.
#
# Concurrency: a new push cancels any in-progress probe for the same job
# group so only the latest commit's expected value is being verified.

name: Post-deploy parity probe (WP-DEP-G-8)

on:
  push:
    branches: [main]

concurrency:
  group: post-deploy-probe
  cancel-in-progress: true

jobs:
  verify:
    name: Verify CF Pages matches commit
    runs-on: ubuntu-latest
    env:
      PAGES_URL: https://uebersetzungswerkstatt.glossolalia.dev
      POLL_INTERVAL_S: 30
      MAX_ATTEMPTS: 20     # 20 × 30 s = 10-minute ceiling

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Derive expected CACHE_NAME from the short SHA ──────────────────
      #
      # The deploy workflow stamps sw.js with werkstatt-<short-sha> at deploy
      # time, so the source sw.js CACHE_NAME is irrelevant for this check.
      - name: Derive expected CACHE_NAME
        id: expected
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          val="werkstatt-${SHORT_SHA}"
          echo "cache_name=$val" >> "$GITHUB_OUTPUT"
          echo "Expected CACHE_NAME: $val"

      # ── 2. Poll sw.js until served CACHE_NAME matches ────────────────────
      #
      # CF Pages propagates quickly but we allow up to 10 minutes to cover
      # any edge-cache delay after the deploy workflow completes.
      - name: Poll sw.js — wait for CACHE_NAME parity (max 10 min)
        id: poll
        run: |
          expected="${{ steps.expected.outputs.cache_name }}"
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            raw=$(curl -sSL --max-time 15 \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "${PAGES_URL}/sw.js" 2>/dev/null || true)
            served=$(echo "$raw" | grep "^const CACHE_NAME" | sed "s/.*'\([^']*\)'.*/\1/")
            echo "[$i/$MAX_ATTEMPTS] served='$served'  expected='$expected'"
            if [ "$served" = "$expected" ]; then
              echo "matched=true"   >> "$GITHUB_OUTPUT"
              echo "served=$served" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::CF Pages sw.js still has CACHE_NAME='$served' after $(( MAX_ATTEMPTS * POLL_INTERVAL_S ))s — expected '$expected'. Deploy may have stalled or CDN propagation failed."
              exit 1
            fi
            sleep "$POLL_INTERVAL_S"
          done

      # ── 3. Spot-check key static assets ──────────────────────────────────
      - name: Verify index.html → HTTP 200
        run: |
          code=$(curl -o /dev/null -sSL --max-time 15 \
            -H "Cache-Control: no-cache" \
            -w "%{http_code}" "${PAGES_URL}/index.html")
          echo "index.html → HTTP $code"
          [ "$code" = "200" ] || { echo "::error::index.html returned HTTP $code"; exit 1; }

      - name: Verify manifest-1.json → HTTP 200
        run: |
          code=$(curl -o /dev/null -sSL --max-time 15 \
            -H "Cache-Control: no-cache" \
            -w "%{http_code}" "${PAGES_URL}/manifest-1.json")
          echo "manifest-1.json → HTTP $code"
          [ "$code" = "200" ] || { echo "::error::manifest-1.json returned HTTP $code"; exit 1; }

      # ── 4. Validate CACHE_NAME has werkstatt- prefix ─────────────────────
      - name: Validate CACHE_NAME has werkstatt- prefix
        run: |
          served="${{ steps.poll.outputs.served }}"
          echo "$served" | grep -qE "^werkstatt-" || {
            echo "::error::CACHE_NAME '$served' does not have expected werkstatt- prefix"
            exit 1
          }
          echo "✓ CACHE_NAME prefix OK: $served"

      # ── 5. Verify CSP-Report-Only header delivered by CF Pages ───────────
      - name: Verify Content-Security-Policy-Report-Only header present
        run: |
          headers=$(curl -sI --max-time 15 "${PAGES_URL}/")
          echo "$headers" | grep -i "content-security-policy-report-only" \
            || { echo "::error::Content-Security-Policy-Report-Only header not found on ${PAGES_URL}/"; exit 1; }
          echo "✓ CSP-Report-Only header present"

      # ── 6. Job summary ────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Post-deploy parity probe — WP-DEP-G-8"
            echo ""
            echo "**Pages URL:** \`${PAGES_URL}\`"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            if [ "${{ steps.poll.outputs.matched }}" = "true" ]; then
              echo "| Check | Result |"
              echo "|---|---|"
              echo "| \`sw.js\` CACHE_NAME | ✅ \`${{ steps.poll.outputs.served }}\` — matches commit |"
              echo "| \`index.html\` | ✅ HTTP 200 |"
              echo "| \`manifest-1.json\` | ✅ HTTP 200 |"
              echo "| CACHE_NAME prefix \`werkstatt-\` | ✅ |"
              echo "| CSP-Report-Only header | ✅ |"
            else
              echo "❌ Probe failed — see step logs above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
